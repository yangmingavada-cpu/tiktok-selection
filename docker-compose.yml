services:
  postgres:
    image: postgres:16-alpine
    container_name: tiktok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tiktok_selection
      POSTGRES_USER: tiktok_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tiktok_app_2026}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - max_connections=500
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok_app -d tiktok_selection"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: tiktok-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tiktok_redis_2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: sh -c "redis-stack-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru --requirepass ${REDIS_PASSWORD:-tiktok_redis_2026}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  java-backend:
    image: maven:3.9-eclipse-temurin-21
    container_name: tiktok-java
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./java-backend:/app
      - maven_repo:/root/.m2
      - memory_data:/data/memory
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${DB_PASSWORD:-tiktok_app_2026}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tiktok_redis_2026}
      JWT_SECRET: ${JWT_SECRET:-tiktok-selection-jwt-secret-key-2026-must-be-at-least-256-bits-long}
      MCP_INTERNAL_TOKEN: ${MCP_INTERNAL_TOKEN:-mcp-dev-token-change-in-production}
      AES_SECRET_KEY: ${AES_SECRET_KEY:-dGlrdG9rLWFlcy1rZXktMjAyNi1kZXY=}
      ECHOTIK_API_BASE_URL: ${ECHOTIK_API_BASE_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "8080:8080"
      - "5005:5005"
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Xms512m -Xmx512m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/logs -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-ai:
    image: python:3.12-slim
    container_name: tiktok-python
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./python-ai:/app
      - pip_cache:/root/.cache/pip
    environment:
      JAVA_BACKEND_URL: http://java-backend:8080
      MCP_SERVER_URL: http://java-backend:8080/mcp/jsonrpc
      MCP_INTERNAL_TOKEN: ${MCP_INTERNAL_TOKEN:-mcp-dev-token-change-in-production}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-tiktok_redis_2026}
      REDIS_URL: redis://:${REDIS_PASSWORD:-tiktok_redis_2026}@redis:6379
    ports:
      - "8000:8000"
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - java-backend
      - redis

  vue-frontend:
    image: node:20-alpine
    container_name: tiktok-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./vue-frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - java-backend

volumes:
  postgres_data:
  redis_data:
  maven_repo:
  memory_data:
  frontend_node_modules:
  pip_cache:
